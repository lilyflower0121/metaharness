$schema: https://json-schema.org/draft/2020-12/schema
$id: https://metaharness.dev/schemas/io-publication.schema.yaml
title: Metaharness IO Publication Contract
$type: object
required:
  - io_publication
properties:
  io_publication:
    type: object
    required:
      - access_model
      - audience
      - publish_target
      - include
      - redact
      - human_review
    properties:
      access_model:
        type: string
        enum: [repository_inherited]
      audience:
        type: array
        minItems: 1
        items:
          type: string
          enum: [repository_readers, maintainers, reviewers, ci_auditors]
      publish_target:
        type: string
        enum: [same_repository_pages, same_repository_artifact, repository_attached_artifact]
      include:
        type: array
        minItems: 1
        items:
          type: string
          enum: [gate_summary, validator_outputs, evidence_pointers, residual_risks, receipt_json, contract_summary]
      redact:
        type: array
        items:
          type: string
          enum: [secrets, private_data, absolute_local_paths, raw_logs, credentials]
      human_review:
        type: object
        required: [required, reviewer_role]
        properties:
          required:
            type: boolean
          reviewer_role:
            type: string
            enum: [repository_reader_or_maintainer, maintainer, authorized_reviewer]
additionalProperties: true
