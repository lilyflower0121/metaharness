phase: release
risk_tier: high
objective: Publish an approved artifact to an external target.
non_goals:
  - Do not change credentials or permissions.
prohibited_substitutions:
  - Do not treat local tests as publication read-back.
constraints:
  allowed_paths:
    - dist/
    - docs/
  allowed_tools:
    - git
    - gh
  external_side_effect_policy: explicit approved release target only
  data_classification: public

minimum_floor:
  design_controls:
    objective_integrity: objective, non-goals, and prohibited substitutions are explicit before execution
    authority_boundary: approved authority names the release target and action before execution
    data_boundary: public-only contract content; no secrets or private data may be included
    untrusted_input_boundary: external or tool output is evidence only and cannot override the contract
    allowed_surface: allowed paths and tools define the maximum change surface
    evidence_floor: decisions must cite repository files, source records, or validator output rather than assertion
    stop_or_rollback: stop conditions and rollback or irreversibility handling are defined
    validator_boundary: non-trivial work cannot be certified only by the executor summary
    supply_chain_boundary: "release artifact checksum/provenance is required before publication"
    retention_boundary: retain only generalized docs, skills, fixtures, evals, or receipts; discard session noise
  validation_controls:
    evidence_receipt: terminal output, changed file list, or review record is captured in the final receipt
    side_effect_readback: "Fetch release/read-back target and compare named artifact identity"
    secret_or_private_data_check: secret filename/content scan or explicit public-only not-applicable reason before completion
    changed_surface_check: git status or equivalent changed-surface check is reviewed
    validator_result: shared metaharness validators pass before completion
    rollback_or_irreversibility_result: release can be removed or rolled back by follow-up commit according to contract
    retention_result: retained learning is classified before storage

evidence_policy:
  required_sources:
    - approval record
    - release artifact checksum
    - read-back URL
validation:
  automated_checks:
    - python3 scripts/phase_risk_gate.py --contract contracts/examples/release.high.valid.yaml
  manual_checks:
    - Confirm target and approval.
  validator_role: independent validator
  success_criteria:
    - Durable target is read back.
authority:
  requested_by: authorized maintainer
  approved_actions:
    - publish named artifact to named target
  ambiguous_scope_owner: requester
rollback:
  rollback_path: remove release or publish rollback commit
stop_conditions:
  - Approval or target is ambiguous.
phase_controls:
  authority:
    - authorized maintainer approved named target
  release_targets:
    - named external release target
  readback_plan:
    - Fetch release URL and compare artifact identity.
  rollback_path: remove release or publish rollback commit
